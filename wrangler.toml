name = "catat"
main = "worker/src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# SPA + API dilayani satu Worker. Aset di-build dari apps/web.
[assets]
directory = "apps/web/dist"
binding = "ASSETS"

# Database D1. Ganti database_id setelah membuat DB:
#   wrangler d1 create catat
[[d1_databases]]
binding = "DB"
database_name = "catat"
database_id = "f8295006-c539-4ab2-ab6c-f4e312bd52b2"
migrations_dir = "migrations"

[vars]
ENVIRONMENT = "production"
# URL produksi (harus sama dengan origin worker). Untuk dev lokal, override di .dev.vars
# dengan BETTER_AUTH_URL="http://localhost:8787".
BETTER_AUTH_URL = "https://catat.nurudhuhaalamin.workers.dev"

# Secrets (JANGAN ditaruh di sini): set via `wrangler secret put`
#   wrangler secret put BETTER_AUTH_SECRET
