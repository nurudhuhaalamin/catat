name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build web (PWA)
        run: pnpm --filter @catat/web build
      - name: Validate worker bundle
        run: pnpm --filter @catat/worker exec wrangler deploy --dry-run --config ../wrangler.toml
